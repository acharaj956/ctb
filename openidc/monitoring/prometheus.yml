# Prometheus scrape + alerting config for OpenIDC.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Pipeline State-of-Health metrics, exported by the dashboard service.
  - job_name: openidc-pipeline
    metrics_path: /metrics
    static_configs:
      - targets: ["dashboard:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
