# OpenIDC application-tier Deployments. The stateful infrastructure (Kafka,
# Postgres, RabbitMQ) is provided by operators/charts — see k8s/README.md — and
# is intentionally not hand-rolled here.
#
# All pods run as a non-root user with privilege escalation disabled and all
# Linux capabilities dropped, consistent with docs/SECURITY.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: openidc
  labels: { app: ingestion, tier: app }
spec:
  replicas: 1
  selector:
    matchLabels: { app: ingestion }
  template:
    metadata:
      labels: { app: ingestion, tier: app }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: ingestion
          image: openidc/ingestion:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: openidc-config }
            - secretRef: { name: openidc-secrets }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: station-processing
  namespace: openidc
