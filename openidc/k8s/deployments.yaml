  selector:
    matchLabels: { app: network-processing }
  template:
    metadata:
      labels: { app: network-processing, tier: app }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: network-processing
          image: openidc/network-processing:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: openidc-config }
            - secretRef: { name: openidc-secrets }
          securityContext:
            allowPrivilegeEscalation: false
